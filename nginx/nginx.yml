- name: Install nginx
  package:
    name: nginx
    state: present
- name: Enable nginx
  service:
    name: nginx
    enabled: true
- name: Stop nginx
  systemd: name=nginx state=stopped
- name: Remove preexisting symbolic link
  shell: "rm /etc/nginx/sites-enabled/osrf-ws-http-proxy"
- name: Copy nginx conf files
  shell: "cp {{opensrf_local}}/examples/nginx/osrf-ws-http-proxy /etc/nginx/sites-available/ && ln -s /etc/nginx/sites-available/osrf-ws-http-proxy /etc/nginx/sites-enabled/osrf-ws-http-proxy"
- name: Check for default site conf
  stat:
    path: /etc/nginx/sites-enabled/default
  register: file_status
- name: Remove default site
  shell: "rm /etc/nginx/sites-enabled/default"
  when: file_status.stat.exists
- name: Create SSL directory
  file: path=/etc/apache2/ssl state=directory
- name: Generate dhparam file
  shell: "openssl dhparam -out /etc/apache2/ssl/dhparam.pem 2048"
