- name: Ensure /etc/nginx/bots.d exists
  path: /etc/nginx/bots.d
  state: directory
  owner: root
  group: root
  mode: "0644"
- name: Download install-ngxblocker to /usr/local/bin
  get_url:
    url: https://raw.githubusercontent.com/mitchellkrogza/nginx-ultimate-bad-bot-blocker/master/install-ngxblocker
    dest: /usr/local/sbin/install-ngxblocker
- name: Chmod install-ngxblocker
  shell: "chmod +x /usr/local/sbin/install-ngxblocker"
- name: Install bad bot blocker
  shell: "install-ngxblocker -x"
  chdir: "/usr/local/sbin"
- name: Chmod setup and update
  shell: "chmod +x /usr/local/sbin/setup-ngxblocker && chmod +x /usr/local/sbin/update-ngxblocker"
- name: Run setup
  shell: 
