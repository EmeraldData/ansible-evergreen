- name: Install apache2
  package:
    name: "{{apache_service_name}}"
    state: present
- name: Enable apache2
  service:
    name: "{{apache_service_name}}"
    enabled: true
- name: Stop apache2
  systemd: name=apache2 state=stopped
- name: Copy apache conf files
  shell: "cp {{eg_local}}/Open-ILS/examples/apache_24/eg_34.conf /etc/apache2/sites/available/eg.conf && cp {{eg_local}}/Open-ILS/examples/apache_24/eg_vhost_24.conf /etc/apache2/eg_vhost.conf && cp {{eg_local}}/Open-ILS/examples/apache_24/eg_startup /etc/apache2/"
- name: Create SSL directory
  file: path=/etc/apache2/ssl state=directory
- name: Create SSL certs
  shell: cd /etc/apache2/ssl && openssl req -new -x509 -days 365 -nodes -out server.crt -keyout server.key
  when: create_ssl_certs|bool
- name: Disable mpm_event
  shell: /usr/sbin/a2dismod mpm_event
- name: Enable mpm_prefork
  shell: /usr/sbin/a2enmod mpm_prefork
- name: Enable apache mod expires
  shell: /usr/sbin/a2enmod expires
- name: Enable apache mod rewrite
  shell: /usr/sbin/a2enmod rewrite
- name: Enable apache remoteip
  shell: /usr/sbin/a2enmod remoteip
- name: Configure apache remoteip
  replace:
    dest: /etc/apache2/eg_vhost.conf
    regexp: '^#RemoteIP'
    replace: 'RemoteIP'
- name: Disable default site
  shell: /usr/sbin/a2dissite 000-default
- name: Enable eg.conf
  shell: /usr/sbin/a2ensite eg.conf
- name: Change ownership of /var/lock/apache2
  file: path=/var/lock/apache2 owner=opensrf group=opensrf
- name: Change run-user to opensrf
  replace:
    dest: /etc/apache2/envvars
    regexp: 'www-data'
    replace: 'opensrf'
- name: Set KeepAliveTimeout
  replace:
    dest: /etc/apache2/apache2.conf
    regexp: 'KeepAliveTimeout .*'
    replace: 'KeepAliveTimeout 1'
- name: Create mpm_preform.conf
  template:
    src: mpm_prefork.js2
    dest: /etc/apache2/mods-available/mpm_prefork.conf
    owner: root
    group: root
    mode: "0644"
