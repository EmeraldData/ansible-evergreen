- name: Get file timestamp
  include_tasks: get_timestamp.yml
- name: Load redis-accounts.txt for parsing
  set_fact:
    filename: "{{oils_install_path}}/conf/redis-accounts.txt"
- name: Get redis accounts
  set_fact:
    file_content: "{{ lookup('file', filename) }}"
- name: Grab passwords
  set_fact:
    opensrf_passwd: "{{ file_content | regex_search('SETUSER opensrf on \\>(.{36})', '\\1') | first }}"
    gateway_passwd: "{{ file_content | regex_search('SETUSER gateway on \\>(.{36})', '\\1') | first }}"
    router_passwd: "{{ file_content | regex_search('SETUSER router on \\>(.{36})', '\\1') | first }}"
- name: Check if opensrf_core.xml exists
  stat:
    path: "{{oils_install_path}}/conf/opensrf_core.xml"
  register: file_check
- name: Backup opensrf_core.xml file
  copy:
    src: "{{oils_install_path}}/conf/opensrf_core.xml"
    dest: "{{oils_install_path}}/conf/opensrf_core.xml.{{file_timestamp}}"
    owner: "{{oils_user}}"
    group: "{{oils_user}}"
    mode: "0644"
  when: file_check.stat.exists
- name: Create new opensrf_core.xml file
  template:
    src: opensrf_core.j2
    dest: "{{oils_install_path}}/conf/opensrf_core.xml"
    owner: "{{oils_user}}"
    group: "{{oils_user}}"
    mode: "0644"
- name: Check if opensrf.xml exists
  stat:
    path: "{{oils_install_path}}/conf/opensrf.xml"
  register: file_check
- name: Backup opensrf.xml file
  copy:
    src: "{{oils_install_path}}/conf/opensrf.xml"
    dest: "{{oils_install_path}}/conf/opensrf.xml.{{file_timestamp}}"
    owner: "{{oils_user}}"
    group: "{{oils_user}}"
    mode: "0644"
  when: file_check.stat.exists
- name: Create new opensrf.xml file
  template:
    src: opensrf.j2
    dest: "{{oils_install_path}}/conf/opensrf.xml"
    owner: "{{oils_user}}"
    group: "{{oils_user}}"
    mode: "0644"
- name: Set password in .srfsh.xml file
  replace:
    path: "{{base_dir}}/.srfsh.xml"
    regexp: "(<passwd>).+?(</passwd>)"
    replace: "<passwd>{{opensrf_passwd}}</passwd>"
- name: Password change reminder
  debug:
    msg: "***REMINDER*** If you have set 'overwrite_config_files' in settings.yml to false, you will need to manually change the passwords in {{oils_install_path}}/conf/opensrf_core.xml and {{base_dir}}/.srfsh.xml"
